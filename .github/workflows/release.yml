name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  tagging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout [${{ github.repository }}]
        uses: actions/checkout@v6

      - name: Create and Push Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${{ github.event.inputs.tag }}" -m "Release ${{ github.event.inputs.tag }}"
          git push origin "${{ github.event.inputs.tag }}"

  build-latex:
    uses: ./.github/workflows/latex.yml
    needs: [tagging]

  release-and-deploy:
    runs-on: ubuntu-latest
    needs: [build-latex]

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download compiled PDF
        uses: actions/download-artifact@v8
        with:
          path: compiled

      - name: Install Zensical
        run: pip install zensical

      - name: Build site
        run: |
          mkdir -p docs
          find compiled -type f -name "*.pdf" | sort | while read -r file; do
            cp "$file" "docs/$(basename "$file")"
          done

          zensical build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.inputs.tag }}
          generate_release_notes: true
          files: compiled/**/*.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
